    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- WINDOWS XP SYSTEM CSS --- */
        :root {
            --xp-blue-title: linear-gradient(to right, #0058e6 0%, #3a93ff 100%);
            --xp-blue-title-inactive: linear-gradient(to right, #7A96DF 0%, #9DBAF2 100%);
            --xp-bg: #ECE9D8;
            --xp-taskbar: linear-gradient(to bottom, #245EDC 0%, #3F81EC 8%, #245EDC 40%, #1042AF 100%);
            --xp-start-btn: linear-gradient(to bottom, #419541 0%, #52BE52 10%, #419541 40%, #2A732A 100%);
            --xp-start-btn-hover: linear-gradient(to bottom, #50A850 0%, #63D063 10%, #50A850 40%, #338B33 100%);
            --xp-border-blue: #0055E5;
            --xp-text-black: #000000;
        }

        @font-face {
            font-family: 'Tahoma';
            src: local('Tahoma'), local('Verdana'), local('Segoe UI'), sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Tahoma, 'Microsoft Sans Serif', sans-serif;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Desktop Wallpaper (Bliss representation / Editable) */
        #desktop {
            position: relative;
            width: 100vw;
            height: calc(100vh - 30px);
            background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center bottom;
            overflow: hidden;
            transition: background-image 0.3s ease;
        }

        /* Desktop Icons */
        #icon-grid {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            padding: 15px;
            height: 100%;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            padding: 6px 4px;
            border-radius: 3px;
            transition: background-color 0.1s;
        }

        .desktop-icon:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .desktop-icon.selected {
            background-color: rgba(0, 85, 229, 0.5);
            border: 1px dotted rgba(255, 255, 255, 0.8);
        }

        .desktop-icon svg {
            width: 40px;
            height: 40px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.6));
            margin-bottom: 5px;
        }

        .desktop-icon span {
            color: white;
            font-size: 11px;
            font-weight: 500;
            text-shadow: 1px 1px 2px black, 0 0 1em black;
            line-height: 1.2;
            word-wrap: break-word;
            max-width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Windows Chrome Styling */
        .xp-window {
            position: absolute;
            background-color: var(--xp-bg);
            border: 3px solid var(--xp-border-blue);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.45);
            min-width: 320px;
            min-height: 220px;
            max-width: 100vw;
            max-height: calc(100vh - 30px);
        }

        .xp-window.inactive {
            border-color: #7A96DF;
        }

        .xp-titlebar {
            background: var(--xp-blue-title);
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            cursor: move;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            user-select: none;
            -webkit-user-select: none;
        }

        .xp-window.inactive .xp-titlebar {
            background: var(--xp-blue-title-inactive);
        }

        .xp-titlebar-text {
            color: white;
            font-weight: bold;
            font-size: 13px;
            text-shadow: 1px 1px 2px #000;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        .xp-titlebar-text svg {
            width: 16px; height: 16px;
        }

        .xp-titlebar-buttons {
            display: flex;
            gap: 3px;
        }

        .xp-btn {
            width: 21px; height: 21px;
            border: 1px solid #FFF;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .xp-btn:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.6);
            padding-top: 2px;
            padding-left: 2px;
        }

        .xp-btn-blue {
            background: linear-gradient(to bottom, #3A93FF, #0055E5);
        }
        .xp-btn-red {
            background: linear-gradient(to bottom, #E58273, #E54028);
        }
        .xp-window.inactive .xp-btn {
            opacity: 0.7;
        }

        .xp-content-area {
            flex: 1;
            background-color: white;
            margin: 0 3px 3px 3px;
            border: 1px solid #7F9DB9;
            overflow-y: auto;
            padding: 16px;
            font-size: 13px;
            color: var(--xp-text-black);
            cursor: auto;
            user-select: text;
            -webkit-user-select: text;
        }

        /* Taskbar Styles */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 30px;
            background: var(--xp-taskbar);
            display: flex;
            z-index: 10000;
            border-top: 1px solid #5C94F2;
        }

        #start-btn {
            background: var(--xp-start-btn);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 16px 0 12px;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            cursor: pointer;
            box-shadow: 2px 0 3px rgba(0,0,0,0.35), inset 1px 1px 1px rgba(255,255,255,0.4);
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            gap: 6px;
        }
        #start-btn:hover { background: var(--xp-start-btn-hover); }
        #start-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); padding-top: 1px; }

        #taskbar-apps {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            overflow-x: auto;
        }
        #taskbar-apps::-webkit-scrollbar { display: none; }

        .taskbar-item {
            width: 140px;
            height: 24px;
            background: linear-gradient(to bottom, #3E80ED, #2258D5);
            border-radius: 3px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            color: white;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid #1E4BB5;
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .taskbar-item.active {
            background: linear-gradient(to bottom, #1B45A8, #285DD5);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        .taskbar-item:hover:not(.active) {
            background: linear-gradient(to bottom, #5492F2, #2964DF);
        }

        #system-tray {
            background: linear-gradient(to bottom, #1B49B8, #0E3593);
            border-left: 1px solid #102B6D;
            padding: 0 12px;
            display: flex;
            align-items: center;
            color: white;
            font-size: 11px;
            box-shadow: inset 1px 0 2px rgba(0,0,0,0.3);
        }

        /* Start Menu Panel */
        #start-menu {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 380px;
            height: 480px;
            background: white;
            border: 2px solid var(--xp-border-blue);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            z-index: 10001;
            display: none;
            flex-direction: column;
            box-shadow: 2px -2px 12px rgba(0,0,0,0.55);
        }

        #start-header {
            background: var(--xp-blue-title);
            height: 55px;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            box-shadow: inset 0 -1px 3px rgba(0,0,0,0.3);
        }

        #start-header-avatar {
            width: 38px; height: 38px;
            border: 2px solid white;
            border-radius: 4px;
            background: #fff;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #start-body {
            display: flex;
            flex: 1;
            height: calc(100% - 95px);
        }

        #start-left {
            flex: 1.1;
            background: white;
            padding: 6px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #start-right {
            flex: 0.9;
            background: #D3E5FA;
            border-left: 1px solid #9DBAF2;
            padding: 6px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .start-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            cursor: pointer;
            font-size: 12px;
            color: var(--xp-text-black);
            border-radius: 3px;
        }

        .start-item:hover {
            background-color: #2F71CD;
            color: white;
        }

        .start-item.bold { font-weight: bold; }
        .start-item svg { width: 22px; height: 22px; flex-shrink: 0; }

        .start-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #A0B9E5, transparent);
            margin: 4px 0;
        }

        #start-footer {
            background: linear-gradient(to right, #4182E3, #245EDC);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 12px;
            gap: 15px;
        }

        .footer-btn {
            display: flex; align-items: center; gap: 5px;
            color: white; font-size: 12px; cursor: pointer;
        }
        .footer-btn:hover span { text-decoration: underline; }

        /* Window Specific Content Styles */
        .content-header { border-bottom: 2px solid #D7DCE4; padding-bottom: 5px; margin-bottom: 12px; font-size: 16px; color: #003399; font-weight: bold;}
        .project-card { border: 1px solid #C5D3ED; background: #F4F7FC; padding: 12px; margin-bottom: 12px; border-radius: 4px; }
        .project-title { font-weight: bold; color: #003399; font-size: 14px; margin-bottom: 4px;}
        .tech-tag { display: inline-block; background: #D3E5FA; border: 1px solid #A0B9E5; padding: 1px 5px; font-size: 11px; margin: 1px; border-radius: 3px; color: #1E4BB5;}
        
        /* Admin Form Panel Styling */
        .admin-section-box { border: 1.5px solid #80A4E3; background: #F0F5FD; padding: 12px; margin-bottom: 15px; border-radius: 4px; }
        .admin-section-box-title { font-weight: bold; color: #1E4BB5; font-size: 13px; margin-bottom: 10px; border-bottom: 1px solid #B4C9EF; padding-bottom: 3px; }
        .form-group { margin-bottom: 8px; }
        .form-group label { display: block; font-size: 11px; margin-bottom: 2px; font-weight: bold; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; border: 1px solid #7F9DB9; padding: 4px; font-family: Tahoma, sans-serif; font-size: 12px; background: white; color: black; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: 1px solid #245EDC; }
        
        .btn-classic {
            background: #F0F0F0; border: 1px solid #707070; padding: 4px 14px; font-family: Tahoma, sans-serif; font-size: 12px; cursor: pointer;
            box-shadow: inset 1px 1px 0px #FFF, 1px 1px 0px rgba(0,0,0,0.1);
            color: black;
            border-radius: 3px;
        }
        .btn-classic:active { box-shadow: inset 1px 1px 2px rgba(0,0,0,0.25); background: #E4E4E4;}
        .btn-classic-primary {
            background: #245EDC; border: 1px solid #102B6D; color: white; font-weight: bold;
        }
        .btn-classic-primary:active { background: #1B45A8; }
        .btn-classic-danger {
            background: #E54028; border: 1px solid #A82414; color: white;
        }
        .btn-classic-danger:active { background: #C12E18; }

        /* Theme Styling Overrides */
        .window-titlebar-theme {
            background: var(--theme-titlebar, var(--xp-blue-title)) !important;
        }
        .window-border-theme {
            border-color: var(--theme-border, var(--xp-border-blue)) !important;
        }

        /* XP Authentic Log On Dialog Specifics */
        .xp-logon-container {
            background: #5A7EDC;
            border: 2px solid #D8E4F8;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.5), inset 2px 2px 5px rgba(255,255,255,0.8);
        }
        .xp-logon-banner {
            background: linear-gradient(to right, #00207F 0%, #1040D0 40%, #00207F 100%);
            border-bottom: 2px solid #D8E4F8;
        }

        /* Mobile Responsive Engine Layout */
        @media (max-width: 768px) {
            .xp-window {
                width: 100vw !important;
                height: calc(100vh - 30px) !important;
                top: 0 !important;
                left: 0 !important;
                border-radius: 0;
                border-width: 2px !important;
            }
            .xp-window.minimized { display: none !important; }
            #start-menu { width: 100vw; height: calc(100vh - 30px); bottom: 30px; border-radius: 0;}
            #start-body { flex-direction: column; }
            #start-right { width: 100%; border-left: none; border-top: 1px solid #9DBAF2; }
            #taskbar-apps { overflow-x: auto; }
            .xp-titlebar { cursor: default; } /* Drag disabled on mobile for stack layout stability */
            .desktop-icon { padding: 4px 2px; width: 72px; }
            .desktop-icon span { font-size: 10px; }
            #icon-grid { padding: 8px; gap: 8px; }
        }
    </style>
</head>

function init() {
    applyWallpaperAndTheme();

    renderStartMenu();
    updateClock();
    setInterval(updateClock, 1000);
    
    // Close start menu when clicking outside
    document.addEventListener('mousedown', (e) => {
        const startMenu = document.getElementById('start-menu');
        const startBtn = document.getElementById('start-btn');
        if (isStartMenuOpen && !startMenu.contains(e.target) && !startBtn.contains(e.target)) {
            toggleStartMenu();
        }
    });

    window.addEventListener('resize', handleViewportResize);

    // Auto-open My Computer on load
    setTimeout(() => openWindow('my-computer'), 400);

function applyWallpaperAndTheme() {
    const desktop = document.getElementById('desktop');
    if (portfolioData.appearance && portfolioData.appearance.wallpaperUrl) {
        desktop.style.backgroundImage = `url('${portfolioData.appearance.wallpaperUrl}')`;
    }
    
    if (portfolioData.appearance && portfolioData.appearance.accentColor) {
        document.documentElement.style.setProperty('--xp-border-blue', portfolioData.appearance.accentColor);
    }
    if (portfolioData.appearance && portfolioData.appearance.taskbarTheme) {
        const bar = portfolioData.appearance.taskbarTheme;
        if (bar === 'silver') {
            document.documentElement.style.setProperty('--xp-taskbar', 'linear-gradient(to bottom, #d2d2d9 0%, #b8b8c4 40%, #8a8a9e 100%)');
            document.documentElement.style.setProperty('--xp-border-blue', '#8a8a9e');
        } else if (bar === 'olive') {
            document.documentElement.style.setProperty('--xp-taskbar', 'linear-gradient(to bottom, #a4b38d 0%, #7e9261 40%, #526739 100%)');
            document.documentElement.style.setProperty('--xp-border-blue', '#526739');
        } else {
            document.documentElement.style.setProperty('--xp-taskbar', 'linear-gradient(to bottom, #245EDC 0%, #3F81EC 8%, #245EDC 40%, #1042AF 100%)');
            document.documentElement.style.setProperty('--xp-border-blue', '#0055E5');
        }
    }
}

function handleViewportResize() {
    const isMobile = window.innerWidth <= 768;
    Object.keys(windowState).forEach(id => {
        const el = document.getElementById(`window-${id}`);
        if (el) {
            if (isMobile) {
                el.style.width = '100vw';
                el.style.height = 'calc(100vh - 30px)';
                el.style.top = '0px';
                el.style.left = '0px';
            } else {
                if (!el.dataset.maximized) {
                    el.style.width = '640px';
                    el.style.height = '480px';
                }
            }
        }
    });
}

function downloadResume() {
    const r = portfolioData;
    const path = r.appearance.resumeUrl || 'Tushar_Shinde_Resume.pdf';
    
    const link = document.createElement('a');
    link.href = path;
    link.download = "Tushar_Shinde_Resume.pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    showSystemTrayNotification("File Download", "Resume PDF download initiated!");
}

/* ==========================================
   DYNAMIC DOCUMENT ASSET DOWNLOADER
   ========================================== */
function downloadAsset(key) {
    const assets = portfolioData.assets || {};
    let url = assets[`${key}Url`] || '';
    if (!url) {
        alert(`No custom document configured for this section yet. Please configure it in the Control Panel (Admin)!`);
        return;
    }
    
    const link = document.createElement('a');
    link.href = url;
    link.download = url.startsWith('data:') ? `Tushar_Shinde_${key}_document.pdf` : url.split('/').pop();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    showSystemTrayNotification("File Download", `${key.toUpperCase()} downloaded successfully.`);
}

function showSystemTrayNotification(title, text) {
    const origText = document.getElementById('clock').innerText;
    const tray = document.getElementById('system-tray');
    tray.innerHTML = `<span class="animate-pulse text-green-300 font-bold">📥 Download OK</span>`;
    setTimeout(() => {
        tray.innerHTML = `<span id="clock">${origText}</span>`;
        updateClock();
    }, 4000);
}

function renderDesktopIcons() {

function selectIcon(el, e) {
    document.querySelectorAll('.desktop-icon').forEach(icon => icon.classList.remove('selected'));
    el.classList.add('selected');
    e.stopPropagation();
    
    if (window.innerWidth <= 768) {
        el.ondblclick();
    }
}

    const userField = document.getElementById('logon-username');

    const errBlock = document.getElementById('logon-error');

    if (!userField || !passField) return;

    const usernameInput = userField.value.trim();
    const passwordInput = passField.value;

    if (!usernameInput || !passwordInput) {
        showLogonError("Please enter both User name and Password.");
        return;
    }

    if (usernameInput === SECURE_USERNAME && passwordInput === SECURE_PASS) {
        isAdminLoggedIn = true;
        sessionStorage.setItem('tushar_xp_auth_session', 'true');
        resetActivityTimer();

        const contentArea = document.getElementById('content-admin');
        if (contentArea) {
            contentArea.innerHTML = getWindowContent('admin');
        }
        
        renderStartMenu();
        showSystemTrayNotification("Access Granted", "Administrator authenticated.");
    } else {
        showLogonError("The system could not log you on. Make sure your User name is correct, then type your password again.");
    }
}

function showLogonError(msg) {
    const errBlock = document.getElementById('logon-error');
    if (errBlock) {
        errBlock.innerText = msg;
        errBlock.classList.remove('hidden');
    }
}

function handleAdminLogout(auto = false) {
    isAdminLoggedIn = false;
    sessionStorage.removeItem('tushar_xp_auth_session');
    
    const contentArea = document.getElementById('content-admin');
    if (contentArea) {
        contentArea.innerHTML = getWindowContent('admin');
    }
    
    renderStartMenu();
    
    if (auto) {
        alert("Session Expired: You have been logged out due to inactivity.");
    } else {
        showSystemTrayNotification("Logged Out", "Admin session ended safely.");
    }
}

/* Specialized refresh that scrolls to the newly added item */
function refreshAdminPanelWithScroll(targetId) {
    const container = document.getElementById('content-admin');
    if (container) {
        container.innerHTML = getWindowContent('admin');
        setTimeout(() => {
            const targetEl = document.getElementById(targetId);
            if (targetEl) {

            }
        }, 20);
    }
}

/* ==========================================
   DYNAMIC ADD DIALOG MANAGER
   ========================================== */
function openXPDialog(dialogId, title, fieldsHtml, onConfirmScript) {
    if(document.getElementById(dialogId)) return;
    
    // Transparent blocker to prevent interacting with the background admin panel
    const blocker = document.createElement('div');
    blocker.id = `blocker-${dialogId}`;
    blocker.style.position = 'fixed';
    blocker.style.top = '0'; blocker.style.left = '0';
    blocker.style.width = '100vw'; blocker.style.height = '100vh';
    blocker.style.zIndex = ++topZIndex;
    document.body.appendChild(blocker);

    const winEl = document.createElement('div');
    winEl.id = dialogId;
    winEl.className = 'xp-window window-border-theme text-xs';
    const isMobile = window.innerWidth <= 768;
    if(isMobile) {
        winEl.style.width = '90vw';
        winEl.style.height = 'auto';
    } else {
        winEl.style.width = '420px';
        winEl.style.height = 'auto';
    }
    winEl.style.position = 'fixed';
    winEl.style.top = '50%';
    winEl.style.left = '50%';
    winEl.style.transform = 'translate(-50%, -50%)';
    winEl.style.zIndex = ++topZIndex;
    winEl.style.boxShadow = '4px 4px 20px rgba(0,0,0,0.6)';

    winEl.innerHTML = `
        <div class="xp-titlebar window-titlebar-theme" id="titlebar-${dialogId}">
            <div class="xp-titlebar-text"><span>${title}</span></div>
            <div class="xp-titlebar-buttons">
                <div class="xp-btn xp-btn-red" onclick="closeXPDialog('${dialogId}')" title="Close">
                    <svg width="10" height="10" viewBox="0 0 10 10" stroke="white" stroke-width="2"><line x1="2" y1="2" x2="8" y2="8"></line><line x1="8" y1="2" x2="2" y2="8"></line></svg>
                </div>
            </div>
        </div>
        <div class="xp-content-area" style="overflow: visible; background-color: var(--xp-bg); padding: 15px;">
            ${fieldsHtml}
            <div class="mt-4 flex justify-end gap-2 pt-3 border-t border-gray-300">
                <button class="btn-classic font-bold btn-classic-primary" onclick="${onConfirmScript}">Save & Add</button>
                <button class="btn-classic" onclick="closeXPDialog('${dialogId}')">Cancel</button>
            </div>
        </div>
    `;
    document.body.appendChild(winEl);
    if(!isMobile) dragElement(winEl, document.getElementById(`titlebar-${dialogId}`));
}

function closeXPDialog(dialogId) {
    const dlg = document.getElementById(dialogId);
    if(dlg) dlg.remove();
    const blocker = document.getElementById(`blocker-${dialogId}`);
    if(blocker) blocker.remove();
}

/* ==========================================

   ========================================== */
function uploadAssetBase64(key, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64Data = e.target.result;
        const targetInput = document.getElementById(`adm-asset-${key}`);
        if (targetInput) {
            targetInput.value = base64Data;
        }
        alert(`Successfully imported ${file.name} to sandbox state memory. Make sure to click "Save & Publish Permanent" at the bottom to apply.`);
    };
    reader.readAsDataURL(file);
}

/* ==========================================
   WINDOW MANAGEMENT & LOGIC
   ========================================== */
function openWindow(id) {
    const winConfig = WINDOWS_CONFIG.find(w => w.id === id);
    if (!winConfig) return;

    if (windowState[id]) {
        const el = document.getElementById(`window-${id}`);
        if (windowState[id].minimized) {
            el.style.display = 'flex';
            windowState[id].minimized = false;
        }
        focusWindow(id);
        updateTaskbar();
        return;
    }

    const winEl = document.createElement('div');
    winEl.id = `window-${id}`;
    winEl.className = 'xp-window window-border-theme';
    
    const offset = Object.keys(windowState).length * 20;
    const isMobile = window.innerWidth <= 768;
    
    if (isMobile) {
        winEl.style.width = '100vw';
        winEl.style.height = 'calc(100vh - 30px)';
        winEl.style.top = '0px';
        winEl.style.left = '0px';
    } else {
        winEl.style.width = '640px';
        winEl.style.height = '480px';
        winEl.style.top = `${60 + offset}px`;
        winEl.style.left = `${120 + offset}px`;
    }
    
    winEl.style.zIndex = ++topZIndex;

    winEl.innerHTML = `
        <div class="xp-titlebar window-titlebar-theme" id="titlebar-${id}">
            <div class="xp-titlebar-text">
                <span class="w-4 h-4 block">${winConfig.icon}</span>
                <span>${winConfig.title}</span>
            </div>
            <div class="xp-titlebar-buttons">
                <div class="xp-btn xp-btn-blue" onclick="minimizeWindow(event, '${id}')" title="Minimize">
                    <svg width="10" height="10" viewBox="0 0 10 10" stroke="white" stroke-width="2"><line x1="1" y1="8" x2="9" y2="8"></line></svg>
                </div>
                <div class="xp-btn xp-btn-blue hidden md:flex" onclick="maximizeWindow(event, '${id}')" title="Maximize">
                    <svg width="10" height="10" viewBox="0 0 10 10" stroke="white" stroke-width="1.5" fill="none"><rect x="1" y="1" width="8" height="8"></rect><line x1="1" y1="3" x2="9" y2="3"></line></svg>
                </div>
                <div class="xp-btn xp-btn-red" onclick="closeWindow('${id}')" title="Close">
                    <svg width="10" height="10" viewBox="0 0 10 10" stroke="white" stroke-width="2"><line x1="2" y1="2" x2="8" y2="8"></line><line x1="8" y1="2" x2="2" y2="8"></line></svg>
                </div>
            </div>
        </div>
        <div class="xp-content-area" id="content-${id}">
            ${getWindowContent(id)}
        </div>
    `;

    document.getElementById('windows-container').appendChild(winEl);

    if (!isMobile) {
        dragElement(winEl, document.getElementById(`titlebar-${id}`));
    } else {
        winEl.addEventListener('touchstart', () => focusWindow(id));
    }

    winEl.addEventListener('mousedown', () => focusWindow(id));

    windowState[id] = { id, minimized: false, el: winEl, config: winConfig };
    
    focusWindow(id);
    updateTaskbar();
}

function closeWindow(id) {
    if (!windowState[id]) return;
    const el = document.getElementById(`window-${id}`);
    el.remove();
    delete windowState[id];
    updateTaskbar();
    
    let highest = null;
    let maxZ = 0;
    Object.keys(windowState).forEach(k => {
        if (!windowState[k].minimized && parseInt(windowState[k].el.style.zIndex) > maxZ) {
            maxZ = parseInt(windowState[k].el.style.zIndex);
            highest = k;
        }
    });
    if(highest) focusWindow(highest);
}

function minimizeWindow(e, id) {
    if(e) e.stopPropagation();
    const el = document.getElementById(`window-${id}`);
    el.style.display = 'none';
    windowState[id].minimized = true;
    updateTaskbar();
}

let preMaxState = {};

function maximizeWindow(e, id) {
    if(e) e.stopPropagation();
    const el = document.getElementById(`window-${id}`);
    
    if (!el.dataset.maximized) {
        preMaxState[id] = {
            width: el.style.width,
            height: el.style.height,
            top: el.style.top,
            left: el.style.left
        };
        el.style.width = '100vw';
        el.style.height = 'calc(100vh - 30px)';
        el.style.top = '0px';
        el.style.left = '0px';
        el.dataset.maximized = "true";
    } else {
        el.style.width = preMaxState[id].width;
        el.style.height = preMaxState[id].height;
        el.style.top = preMaxState[id].top;
        el.style.left = preMaxState[id].left;
        delete el.dataset.maximized;
    }
}

function focusWindow(id) {
    const el = document.getElementById(`window-${id}`);
    if (!el) return;
    
    el.style.zIndex = ++topZIndex;

    Object.keys(windowState).forEach(k => {
        const winEl = document.getElementById(`window-${k}`);
        if (winEl) {
            if (k === id) {
                winEl.classList.remove('inactive');
            } else {
                winEl.classList.add('inactive');
            }
        }
    });

    updateTaskbar(id);
}

function toggleStartMenu(e) {
    if (e) e.stopPropagation();
    const menu = document.getElementById('start-menu');
    isStartMenuOpen = !isStartMenuOpen;
    menu.style.display = isStartMenuOpen ? 'flex' : 'none';
}

function updateTaskbar(activeId = null) {
    const container = document.getElementById('taskbar-apps');
    container.innerHTML = '';

    Object.keys(windowState).forEach(id => {
        const win = windowState[id];
        const isActive = activeId === id && !win.minimized;
        const btn = document.createElement('div');
        btn.className = `taskbar-item ${isActive ? 'active' : ''}`;
        
        let iconSvg = win.config.icon.replace(/width=".*?"/, 'width="14"').replace(/height=".*?"/, 'height="14"');
        if (!iconSvg.includes('width=')) iconSvg = iconSvg.replace('<svg', '<svg width="14" height="14"');
        
        btn.innerHTML = `${iconSvg} <span>${win.config.title}</span>`;
        
        btn.onclick = () => {
            if (isActive) {
                minimizeWindow(null, id);
            } else {
                if (win.minimized) {
                    document.getElementById(`window-${id}`).style.display = 'flex';
                    win.minimized = false;
                }
                focusWindow(id);
            }
        };
        container.appendChild(btn);
    });
}

function updateClock() {
    const now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; 
    minutes = minutes < 10 ? '0' + minutes : minutes;
    
    const clockEl = document.getElementById('clock');
    if (clockEl) {
        clockEl.innerText = `${hours}:${minutes} ${ampm}`;
    }
}

// Drag functionality based on viewport boundaries
function dragElement(elmnt, header) {
    var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
    header.onmousedown = dragMouseDown;

    function dragMouseDown(e) {
        if(elmnt.dataset.maximized) return; 
        if(e.target.closest('.xp-btn')) return; 
        e = e || window.event;
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
    }

    function elementDrag(e) {
        e = e || window.event;
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        
        let newTop = elmnt.offsetTop - pos2;
        let newLeft = elmnt.offsetLeft - pos1;

        if (newTop < 0) newTop = 0;
        if (newTop > window.innerHeight - 60) newTop = window.innerHeight - 60;
        
        elmnt.style.top = newTop + "px";
        elmnt.style.left = newLeft + "px";
    }

    function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
    }
}
